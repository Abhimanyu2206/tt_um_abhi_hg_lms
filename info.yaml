# Tiny Tapeout project information
project:
  title:        "HG + LMS PLI Canceller"
  author:       "Abhimanyu"
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Power line interference canceller using harmonic generator and LMS adaptive filter with optimized arithmetic"
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     10000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "2x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_abhi_hg_lms"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - tt_um_abhi_hg_lms.v
    - hg_lms_top.v
    - harmonic_generator.v
    - lms_adaptive_filter.v
    - compressor3_2.v
    - radix4_square_8bit.v
    - radix4_square_16bit.v
    - shift_add_mul_8x16.v

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs (ui_in → x_in)
  ui[0]: "x_in[0]"
  ui[1]: "x_in[1]"
  ui[2]: "x_in[2]"
  ui[3]: "x_in[3]"
  ui[4]: "x_in[4]"
  ui[5]: "x_in[5]"
  ui[6]: "x_in[6]"
  ui[7]: "x_in[7]"

  # Outputs (uo_out → y_out upper bits)
  uo[0]: "y_out[8]"
  uo[1]: "y_out[9]"
  uo[2]: "y_out[10]"
  uo[3]: "y_out[11]"
  uo[4]: "y_out[12]"
  uo[5]: "y_out[13]"
  uo[6]: "y_out[14]"
  uo[7]: "y_out[15]"

  # Bidirectional (input side → d_in)
  uio[0]: "d_in[0]"
  uio[1]: "d_in[1]"
  uio[2]: "d_in[2]"
  uio[3]: "d_in[3]"
  uio[4]: "d_in[4]"
  uio[5]: "d_in[5]"
  uio[6]: "d_in[6]"
  uio[7]: "d_in[7]"
# Do not change!
yaml_version: 6
